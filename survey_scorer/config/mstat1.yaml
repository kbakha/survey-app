instrument:
  id: mstat1
  name: "Тест толерантности к неопределённости MSTAT-1 (McLain, адаптация Луковицкой/Осина)"
  n_items: 22
  min_score: 1
  max_score: 7
  aggregation: direct_minus_reverse
  instruction: >
    Оцените, насколько вы считаете данные высказывания верными в отношении себя.

scale_labels:
  - "Совершенно не согласен"
  - "Не согласен"
  - "Скорее не согласен"
  - "Нечто среднее"
  - "Скорее согласен"
  - "Согласен"
  - "Совершенно согласен"

items:
  - {n: 1,  text: "Я плохо выношу неопределённые ситуации"}
  - {n: 2,  text: "Мне бывает трудно реагировать на неопределённые события"}
  - {n: 3,  text: "Думаю, что новые ситуации более опасны, чем привычные"}
  - {n: 4,  text: "Меня привлекают ситуации, которые можно по-разному истолковать"}
  - {n: 5,  text: "Я бы предпочёл избежать решения проблем, которые необходимо рассматривать с разных точек зрения"}
  - {n: 6,  text: "Я пытаюсь избежать неопределённых событий"}
  - {n: 7,  text: "Я хорошо справляюсь с неопределёнными ситуациями"}
  - {n: 8,  text: "Я предпочитаю привычные ситуации новым"}
  - {n: 9,  text: "Вопросы, которые нельзя рассматривать только с одной точки зрения, несколько пугают меня"}
  - {n: 10, text: "Я избегаю ситуаций, которые слишком трудны для моего понимания"}
  - {n: 11, text: "Я терпим к неопределённым ситуациям"}
  - {n: 12, text: "Мне доставляет удовольствие решение проблем, которые довольно сложны и неопределённы"}
  - {n: 13, text: "Я пытаюсь избегать проблем, которые не имеют единственного «лучшего» решения"}
  - {n: 14, text: "Я часто ищу что-либо новое и не стараюсь сохранять всё по-старому в своей жизни"}
  - {n: 15, text: "Я обычно предпочитаю новизну, нежели привычное"}
  - {n: 16, text: "Мне не нравятся неопределённые ситуации"}
  - {n: 17, text: "Некоторые проблемы так сложны, что попытка понять их доставляет удовольствие"}
  - {n: 18, text: "Я вовсе не переживаю, когда приходится искать выход в неожиданной ситуации"}
  - {n: 19, text: "Мне нравится заниматься проблемными ситуациями, которые своей сложностью ставят в тупик некоторых людей"}
  - {n: 20, text: "Мне трудно делать выбор, когда результат не ясен"}
  - {n: 21, text: "Мне доставляет удовольствие удивляться время от времени"}
  - {n: 22, text: "Я предпочитаю ситуацию, в которой есть некоторая неопределённость"}

scales:
  - id: T
    name: "Толерантность к неопределённости"
    direct_items:  [4, 7, 11, 12, 14, 15, 17, 18, 19, 21, 22]
    reverse_items: [1, 2, 3, 5, 6, 8, 9, 10, 13, 16, 20]
    is_total: true

norms:
  - {scale_id: T, level: negative, label: "Интолерантность", min_val: -66, max_val: -1,  interpretation: "Дискомфорт в неопределённых ситуациях, стремление к жёсткой регламентации"}
  - {scale_id: T, level: neutral,  label: "Нейтральный",     min_val: 0,   max_val: 0,   interpretation: "Баланс между принятием и избеганием неопределённости"}
  - {scale_id: T, level: positive, label: "Толерантность",   min_val: 1,   max_val: 66,  interpretation: "Открытость к неопределённости, психологическая гибкость"}
