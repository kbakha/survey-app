instrument:
  id: usk
  name: "4. УСК — Уровень субъективного контроля (Бажина)"
  n_items: 44
  min_score: -3
  max_score: 3
  aggregation: direct_minus_reverse
  scale_values: [-3, -2, -1, 1, 2, 3]
  instruction: |
    Вам предлагается 44 утверждения. Оцените степень своего согласия или несогласия с каждым из них,
    используя шкалу от −3 (полностью не согласен) до +3 (полностью согласен). Оценка 0 не используется.

scale_labels:
  - "Полностью не согласен"
  - "Частично не согласен"
  - "Скорее не согласен"
  - "Скорее согласен"
  - "Частично согласен"
  - "Полностью согласен"

items:
  - {n: 1,  text: "Продвижение по службе больше зависит от удачного стечения обстоятельств, чем от способностей и усилий человека."}
  - {n: 2,  text: "Большинство разводов происходит оттого, что люди не захотели приспособиться друг к другу."}
  - {n: 3,  text: "Болезнь — дело случая; если уж суждено заболеть, то ничего не поделаешь."}
  - {n: 4,  text: "Люди оказываются одинокими из-за того, что сами не проявляют интереса и дружелюбия к окружающим."}
  - {n: 5,  text: "Осуществление моих желаний часто зависит от везения."}
  - {n: 6,  text: "Бесполезно предпринимать усилия, чтобы завоевать симпатию других людей."}
  - {n: 7,  text: "Внешние обстоятельства – родители и благосостояние – влияют на семейное счастье не меньше, чем отношения супругов."}
  - {n: 8,  text: "Я часто чувствую, что мало влияю на то, что происходит со мной."}
  - {n: 9,  text: "Как правило, руководство оказывается более эффективным, когда полностью контролирует действия подчиненных, а не полагается на их самостоятельность."}
  - {n: 10, text: "Мои отметки в школе часто зависели от случайных обстоятельств (например, от настроения учителя), чем от своих собственных усилий."}
  - {n: 11, text: "Когда я строю планы, то я, в общем, верю, что смогу осуществить их."}
  - {n: 12, text: "То, что многим людям кажется удачей или везением, на самом деле является результатом долгих целенаправленных усилий."}
  - {n: 13, text: "Думаю, что правильный образ жизни может больше помочь здоровью, чем врачи и лекарства."}
  - {n: 14, text: "Если люди не подходят друг другу, то, как бы они не старались, наладить семейную жизнь они все равно не смогут."}
  - {n: 15, text: "То хорошее, что я делаю, обычно бывает по достоинству оценено другими."}
  - {n: 16, text: "Дети вырастают такими, какими их воспитывают родители."}
  - {n: 17, text: "Думаю, что случай или судьба не играют важной роли в моей жизни."}
  - {n: 18, text: "Я стараюсь не планировать далеко вперед, потому что многое зависит от того, как сложатся обстоятельства."}
  - {n: 19, text: "Мои отметки в школе больше зависели от моих усилий и моей подготовленности."}
  - {n: 20, text: "В семейных конфликтах я чаще чувствую вину за собой, чем за противоположной стороной."}
  - {n: 21, text: "Жизнь большинства людей зависит от стечения обстоятельств."}
  - {n: 22, text: "Я предпочитаю такое руководство, при котором можно самостоятельно определять, что и как делать."}
  - {n: 23, text: "Думаю, что мой образ жизни ни в коей мере не является причиной моих болезней."}
  - {n: 24, text: "Как правило, неудачное стечение обстоятельств мешает людям добиться успехов в своём деле."}
  - {n: 25, text: "В конце концов, за плохое управление организацией ответственны сами люди, которые в ней работают."}
  - {n: 26, text: "Я часто чувствую, что ничего не могу изменить в сложившихся отношениях в семье."}
  - {n: 27, text: "Если я очень захочу, то смогу расположить к себе почти любого."}
  - {n: 28, text: "На подрастающее поколение влияет так много обстоятельств, что усилия родителей по их воспитанию часто оказываются бесполезными."}
  - {n: 29, text: "То, что со мной случается — это дело моих рук."}
  - {n: 30, text: "Трудно бывает понять, почему руководители поступают так, а не иначе."}
  - {n: 31, text: "Человек, который не смог добиться успеха в своей работе, скорее всего не проявил достаточно усилий."}
  - {n: 32, text: "Чаще всего я могу добиться от членов моей семьи того, что я хочу."}
  - {n: 33, text: "В неприятностях и неудачах, которые были в моей жизни, чаще были виноваты другие люди, чем я сам."}
  - {n: 34, text: "Ребёнка всегда можно уберечь от простуды."}
  - {n: 35, text: "В сложных обстоятельствах я предпочитаю подождать, пока проблемы разрешатся сами собой."}
  - {n: 36, text: "Успех является результатом упорной работы и мало зависит от случая или везения."}
  - {n: 37, text: "Я чувствую, что от меня больше, чем от кого бы то ни было, зависит счастье моей семьи."}
  - {n: 38, text: "Мне всегда трудно понять, почему я нравлюсь одним людям и не нравлюсь другим."}
  - {n: 39, text: "Я всегда предпочитаю принять решение и действовать самостоятельно, а не надеяться на помощь других людей или судьбу."}
  - {n: 40, text: "К сожалению, заслуги человека часто остаются непризнанными, несмотря на все его старания."}
  - {n: 41, text: "В семейной жизни бывают такие ситуации, которые невозможно разрешить даже при самом сильном желании."}
  - {n: 42, text: "Способные люди, не сумевшие реализовать свои возможности, должны винить в этом только самих себя."}
  - {n: 43, text: "Многие мои успехи были возможны только благодаря помощи других людей."}
  - {n: 44, text: "Большинство неудач в моей жизни произошло от неумения, незнания или лени и мало зависело от везения или невезения."}

scales:
  - id: io
    name: "Ио — Общая интернальность"
    direct_items: [2, 4, 11, 12, 13, 15, 16, 17, 19, 20, 22, 25, 27, 29, 31, 32, 34, 36, 37, 39, 42, 44]
    reverse_items: [1, 3, 5, 6, 7, 8, 9, 10, 14, 18, 21, 23, 24, 26, 28, 30, 33, 35, 38, 40, 41, 43]
    is_total: true
  - id: id
    name: "Ид — Достижения"
    direct_items: [12, 15, 27, 32, 36, 37]
    reverse_items: [1, 5, 6, 14, 26, 43]
    is_total: false
  - id: in
    name: "Ин — Неудачи"
    direct_items: [2, 4, 20, 31, 42, 44]
    reverse_items: [7, 24, 33, 38, 40, 41]
    is_total: false
  - id: is
    name: "Ис — Семейные отношения"
    direct_items: [2, 16, 20, 32, 37]
    reverse_items: [7, 14, 26, 28, 41]
    is_total: false
  - id: ip
    name: "Ип — Производственные отношения"
    direct_items: [19, 22, 25, 31, 42]
    reverse_items: [1, 9, 10, 24, 30]
    is_total: false
  - id: im
    name: "Им — Межличностные отношения"
    direct_items: [4, 27]
    reverse_items: [6, 38]
    is_total: false
  - id: iz
    name: "Из — Здоровье и болезнь"
    direct_items: [13, 34]
    reverse_items: [3, 23]
    is_total: false

norms:
  # Ио — Общая интернальность (range −132 to +132)
  - scale_id: io
    level: low
    label: Низкий
    min_val: -132
    max_val: 9
    interpretation: "Низкий уровень субъективного контроля (экстернальный тип). Склонность объяснять жизненные события внешними обстоятельствами, удачей или судьбой."
  - scale_id: io
    level: medium
    label: Средний
    min_val: 10
    max_val: 56
    interpretation: "Нормативный уровень субъективного контроля. Баланс между принятием ответственности и признанием роли внешних обстоятельств."
  - scale_id: io
    level: high
    label: Высокий
    min_val: 57
    max_val: 132
    interpretation: "Высокий уровень субъективного контроля (интернальный тип). Человек считает себя ответственным за большинство значимых событий своей жизни."

  # Ид — Достижения (range −36 to +36)
  - scale_id: id
    level: low
    label: Низкий
    min_val: -36
    max_val: -3
    interpretation: "Низкая интернальность в области достижений. Успехи приписываются удаче, случаю или помощи других людей."
  - scale_id: id
    level: medium
    label: Средний
    min_val: -2
    max_val: 14
    interpretation: "Нормативный уровень. Умеренная ответственность за собственные достижения."
  - scale_id: id
    level: high
    label: Высокий
    min_val: 15
    max_val: 36
    interpretation: "Высокая интернальность в области достижений. Успехи объясняются собственными способностями и целенаправленными усилиями."

  # Ин — Неудачи (range −36 to +36)
  - scale_id: in
    level: low
    label: Низкий
    min_val: -36
    max_val: 0
    interpretation: "Низкая интернальность в области неудач. Склонность перекладывать ответственность за провалы на внешние обстоятельства или других людей."
  - scale_id: in
    level: medium
    label: Средний
    min_val: 1
    max_val: 15
    interpretation: "Нормативный уровень. Сбалансированное принятие ответственности за неудачи."
  - scale_id: in
    level: high
    label: Высокий
    min_val: 16
    max_val: 36
    interpretation: "Высокая интернальность в области неудач. Человек берёт на себя ответственность за свои провалы и ищет причины в себе."

  # Ис — Семейные отношения (range −30 to +30)
  - scale_id: is
    level: low
    label: Низкий
    min_val: -30
    max_val: -5
    interpretation: "Низкая интернальность в семейных отношениях. Семейные проблемы приписываются партнёру или внешним обстоятельствам."
  - scale_id: is
    level: medium
    label: Средний
    min_val: -4
    max_val: 10
    interpretation: "Нормативный уровень. Умеренная ответственность за характер семейных отношений."
  - scale_id: is
    level: high
    label: Высокий
    min_val: 11
    max_val: 30
    interpretation: "Высокая интернальность в семейных отношениях. Ответственность за характер и качество семейных отношений берётся на себя."

  # Ип — Производственные отношения (range −30 to +30)
  - scale_id: ip
    level: low
    label: Низкий
    min_val: -30
    max_val: 3
    interpretation: "Низкая интернальность в производственных отношениях. Склонность объяснять трудовые неудачи обстоятельствами или действиями руководства."
  - scale_id: ip
    level: medium
    label: Средний
    min_val: 4
    max_val: 19
    interpretation: "Нормативный уровень. Умеренная ответственность в профессиональной сфере."
  - scale_id: ip
    level: high
    label: Высокий
    min_val: 20
    max_val: 30
    interpretation: "Высокая интернальность в производственных отношениях. Инициативен, берёт на себя ответственность за профессиональные результаты."

  # Им — Межличностные отношения (range −12 to +12)
  - scale_id: im
    level: low
    label: Низкий
    min_val: -12
    max_val: -3
    interpretation: "Низкая интернальность в межличностных отношениях. Затрудняется объяснить характер отношений с людьми своими собственными действиями."
  - scale_id: im
    level: medium
    label: Средний
    min_val: -2
    max_val: 6
    interpretation: "Нормативный уровень. Умеренная уверенность в возможности контролировать межличностные отношения."
  - scale_id: im
    level: high
    label: Высокий
    min_val: 7
    max_val: 12
    interpretation: "Высокая интернальность в межличностных отношениях. Уверен в способности вызывать симпатию и выстраивать хорошие отношения с людьми."

  # Из — Здоровье и болезнь (range −12 to +12)
  - scale_id: iz
    level: low
    label: Низкий
    min_val: -12
    max_val: -2
    interpretation: "Низкая интернальность в отношении здоровья. Здоровье воспринимается как не зависящее от собственного образа жизни."
  - scale_id: iz
    level: medium
    label: Средний
    min_val: -1
    max_val: 6
    interpretation: "Нормативный уровень. Умеренная ответственность за состояние своего здоровья."
  - scale_id: iz
    level: high
    label: Высокий
    min_val: 7
    max_val: 12
    interpretation: "Высокая интернальность в отношении здоровья. Человек считает, что его здоровье во многом определяется образом жизни и собственными усилиями."
