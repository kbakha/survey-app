instrument:
  id: driver
  name: "Определение ведущего драйвера (Т. Кэлер, Driver Questionnaire)"
  n_items: 25
  min_score: 0
  max_score: 2
  aggregation: sum_subscales
  instruction: >
    Оцените каждое утверждение исходя из того, насколько оно характерно
    для вашего обычного стиля работы и поведения.

scale_labels:
  - "Нет"
  - "В некоторой степени"
  - "Да"

items:
  # Блок 1 — Будь совершенным
  - {n: 1,  text: "Вы устанавливаете себе высокие стандарты, а затем критикуете себя за неспособность соответствовать им?"}
  - {n: 2,  text: "Для вас важно быть правым?"}
  - {n: 3,  text: "Чувствуете ли вы дискомфорт из-за небольшого беспорядка или несоответствия (пятно на одежде, орнамент не на месте, беспорядочное выполнение работы)?"}
  - {n: 4,  text: "Склонны ли вы сдерживать (минимизировать) использование прилагательных и жестов?"}
  - {n: 5,  text: "Проверяете ли вы всё тщательно, ища возможные ошибки?"}
  # Блок 2 — Радуй других
  - {n: 6,  text: "Важно ли вам нравиться людям?"}
  - {n: 7,  text: "Вы часто соглашаетесь с людьми, чтобы не обидеть их?"}
  - {n: 8,  text: "Вы чувствуете ответственность за то, чтобы окружающие были довольны и чувствовали себя комфортно?"}
  - {n: 9,  text: "Вы склонны извиняться или оправдываться, если что-то идёт не так?"}
  - {n: 10, text: "Вы ищете одобрения своих действий от значимых людей?"}
  # Блок 3 — Спеши
  - {n: 11, text: "Вы часто делаете несколько дел одновременно?"}
  - {n: 12, text: "Вы часто перебиваете людей, чтобы закончить их предложения за них?"}
  - {n: 13, text: "Вы склонны быстро ходить, быстро есть и быстро говорить?"}
  - {n: 14, text: "Вы чувствуете нетерпение, когда другие люди медлят или «тянут время»?"}
  - {n: 15, text: "Вы склонны брать на себя больше обязательств, чем объективно можете выполнить?"}
  # Блок 4 — Будь сильным
  - {n: 16, text: "Считаете ли вы, что показывать свои чувства — это признак слабости?"}
  - {n: 17, text: "Вы склонны скрывать свои эмоции, даже когда находитесь в стрессе?"}
  - {n: 18, text: "Вы гордитесь тем, что можете справляться с трудностями без посторонней помощи?"}
  - {n: 19, text: "Вы редко просите о помощи, даже когда она вам действительно нужна?"}
  - {n: 20, text: "Вы считаете, что должны всегда оставаться спокойным и невозмутимым?"}
  # Блок 5 — Старайся
  - {n: 21, text: "Вы ненавидите сдаваться или отступать, надеясь, что на этот раз «всё сработает»?"}
  - {n: 22, text: "Есть ли у вас склонность начинать много дел, но не всегда доводить их до конца?"}
  - {n: 23, text: "Вы склонны сравнивать себя с другими и чувствовать себя лучше или хуже в зависимости от этого?"}
  - {n: 24, text: "Часто ли вы «ходите по кругу» с решением проблемы, ощущая, что застряли?"}
  - {n: 25, text: "Есть ли у вас тенденция быть «бунтовщиком» или проявлять упрямство в группе?"}

scales:
  - id: perfect
    name: "Будь совершенным"
    direct_items: [1, 2, 3, 4, 5]
    reverse_items: []
    is_total: false

  - id: please
    name: "Радуй других"
    direct_items: [6, 7, 8, 9, 10]
    reverse_items: []
    is_total: false

  - id: hurry
    name: "Спеши"
    direct_items: [11, 12, 13, 14, 15]
    reverse_items: []
    is_total: false

  - id: strong
    name: "Будь сильным"
    direct_items: [16, 17, 18, 19, 20]
    reverse_items: []
    is_total: false

  - id: try
    name: "Старайся"
    direct_items: [21, 22, 23, 24, 25]
    reverse_items: []
    is_total: false

norms:
  - {scale_id: perfect, level: low,    label: "Низкий",   min_val: 0, max_val: 3,  interpretation: "Драйвер практически не влияет на поведение, человек гибок в этом аспекте"}
  - {scale_id: perfect, level: medium, label: "Средний",  min_val: 4, max_val: 6,  interpretation: "Умеренное проявление: стиль активируется в стрессе, но остаётся под контролем"}
  - {scale_id: perfect, level: high,   label: "Ведущий",  min_val: 7, max_val: 10, interpretation: "Ведущий драйвер: стремление к безупречности, перфекционизм, высокое качество работы"}

  - {scale_id: please,  level: low,    label: "Низкий",   min_val: 0, max_val: 3,  interpretation: "Драйвер практически не влияет на поведение"}
  - {scale_id: please,  level: medium, label: "Средний",  min_val: 4, max_val: 6,  interpretation: "Умеренная чувствительность к оценке окружающих"}
  - {scale_id: please,  level: high,   label: "Ведущий",  min_val: 7, max_val: 10, interpretation: "Ведущий драйвер: высокая потребность в одобрении, избегание конфликтов, риск выгорания"}

  - {scale_id: hurry,   level: low,    label: "Низкий",   min_val: 0, max_val: 3,  interpretation: "Драйвер практически не влияет на поведение"}
  - {scale_id: hurry,   level: medium, label: "Средний",  min_val: 4, max_val: 6,  interpretation: "Умеренная склонность к спешке и многозадачности"}
  - {scale_id: hurry,   level: high,   label: "Ведущий",  min_val: 7, max_val: 10, interpretation: "Ведущий драйвер: постоянное ощущение цейтнота, быстрая реакция, риск ошибок из-за спешки"}

  - {scale_id: strong,  level: low,    label: "Низкий",   min_val: 0, max_val: 3,  interpretation: "Драйвер практически не влияет на поведение"}
  - {scale_id: strong,  level: medium, label: "Средний",  min_val: 4, max_val: 6,  interpretation: "Умеренная эмоциональная закрытость и самодостаточность"}
  - {scale_id: strong,  level: high,   label: "Ведущий",  min_val: 7, max_val: 10, interpretation: "Ведущий драйвер: эмоциональная закрытость, сила в кризисе, риск социальной изоляции"}

  - {scale_id: try,     level: low,    label: "Низкий",   min_val: 0, max_val: 3,  interpretation: "Драйвер практически не влияет на поведение"}
  - {scale_id: try,     level: medium, label: "Средний",  min_val: 4, max_val: 6,  interpretation: "Умеренная ориентация на процесс, а не на результат"}
  - {scale_id: try,     level: high,   label: "Ведущий",  min_val: 7, max_val: 10, interpretation: "Ведущий драйвер: фокус на борьбе, энтузиазм при старте, трудности с завершением"}
