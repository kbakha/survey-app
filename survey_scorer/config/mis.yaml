instrument:
  id: mis
  name: "5. МИС — Методика исследования самоотношения (Пантилеев)"
  n_items: 110
  min_score: 0
  max_score: 1
  aggregation: sum_subscales
  instruction: |
    Вам предлагается 110 утверждений о себе. Прочитайте каждое и отметьте,
    согласны вы с ним или нет. Здесь нет правильных или неправильных ответов —
    важно ваше личное мнение.

scale_labels:
  - "Нет"
  - "Да"

items:
  - {n: 1,   text: "Мои слова довольно редко расходятся с делами."}
  - {n: 2,   text: "Случайному человеку я, скорее всего, покажусь человеком приятным."}
  - {n: 3,   text: "К чужим проблемам я всегда отношусь с тем же пониманием, что и к своим."}
  - {n: 4,   text: "У меня нередко возникает чувство, что то, о чем я с собой мысленно разговариваю, мне неприятно."}
  - {n: 5,   text: "Думаю, что все мои знакомые относятся ко мне с симпатией."}
  - {n: 6,   text: "Самое разумное, что может сделать человек в своей жизни, это не противиться собственной судьбе."}
  - {n: 7,   text: "У меня достаточно способностей и энергии воплотить в жизнь задуманное."}
  - {n: 8,   text: "Если бы я раздвоился, то мне было бы довольно интересно общаться со своим двойником."}
  - {n: 9,   text: "Я не способен причинять душевную боль самым любимым и родным мне людям."}
  - {n: 10,  text: "Я считаю, что не грех иногда пожалеть самого себя."}
  - {n: 11,  text: "Совершив какой-то промах, я часто не могу понять, как же мне могло прийти в голову, что из задуманного могло получиться что-нибудь хорошее."}
  - {n: 12,  text: "Чаще всего я одобряю свои планы и поступки."}
  - {n: 13,  text: "В моей личности есть, наверное, что-то такое, что способно вызвать у других острую неприязнь."}
  - {n: 14,  text: "Когда я пытаюсь оценить себя, я прежде всего вижу свои недостатки."}
  - {n: 15,  text: "У меня не получается быть для любимого человека интересным длительное время."}
  - {n: 16,  text: "Можно сказать, что я ценю себя достаточно высоко."}
  - {n: 17,  text: "Мой внутренний голос редко подсказывает мне то, с чем бы я в конце концов не согласился."}
  - {n: 18,  text: "Многие мои знакомые не принимают меня так уж всерьез."}
  - {n: 19,  text: "Бывало, и не раз, что я сам остро ненавидел себя."}
  - {n: 20,  text: "Мне очень мешает недостаток энергии, воли и целеустремленности."}
  - {n: 21,  text: "В моей жизни возникали такие обстоятельства, когда я шел на сделку с собственной совестью."}
  - {n: 22,  text: "Иногда я сам себя плохо понимаю."}
  - {n: 23,  text: "Порой мне бывает мучительно больно общаться с самим собой."}
  - {n: 24,  text: "Думаю, что без труда смог бы найти общий язык с любым разумным и знающим человеком."}
  - {n: 25,  text: "Если я и отношусь к кому-нибудь с укоризной, то прежде всего к самому себе."}
  - {n: 26,  text: "Иногда я сомневаюсь, можно ли любить меня по-настоящему."}
  - {n: 27,  text: "Нередко мои споры с самим собой обрываются мыслью, что все равно выйдет не так, как я решил."}
  - {n: 28,  text: "Мое отношение к самому себе можно назвать дружеским."}
  - {n: 29,  text: "Вряд ли найдутся люди, которым я не по душе."}
  - {n: 30,  text: "Часто я не без издевки подшучиваю над собой."}
  - {n: 31,  text: "Если бы мое второе «Я» существовало, то для меня это был бы довольно скучный партнер по общению."}
  - {n: 32,  text: "Мне представляется, что я достаточно сложился как личность, и поэтому не трачу много сил на то, чтобы в чем-то стать другим."}
  - {n: 33,  text: "В целом меня устраивает то, какой я есть."}
  - {n: 34,  text: "К сожалению, слишком многие не разделяют моих взглядов на жизнь."}
  - {n: 35,  text: "Я вполне могу сказать, что уважаю сам себя."}
  - {n: 36,  text: "Я думаю, что имею умного и надежного советчика в себе самом."}
  - {n: 37,  text: "Сам у себя я довольно часто вызываю чувство раздражения."}
  - {n: 38,  text: "Я часто, но довольно безуспешно пытаюсь в себе что-то изменить."}
  - {n: 39,  text: "Я думаю, что моя личность гораздо интереснее и богаче, чем это может показаться на первый взгляд."}
  - {n: 40,  text: "Мои достоинства вполне перевешивают мои недостатки."}
  - {n: 41,  text: "Я редко остаюсь непонятым в самом важном для меня."}
  - {n: 42,  text: "Думаю, что другие в целом оценивают меня достаточно высоко."}
  - {n: 43,  text: "То, что со мной случается, — это дело моих собственных рук."}
  - {n: 44,  text: "Если я спорю с собой, то всегда уверен, что найду единственно правильное решение."}
  - {n: 45,  text: "Когда со мной случаются неприятности, как правило, я говорю: «И поделом тебе»."}
  - {n: 46,  text: "Я не считаю, что достаточно духовно интересен для того, чтобы быть притягательным для многих людей."}
  - {n: 47,  text: "У меня нередко возникает сомнения: а таков ли я на самом деле, каким себе представляюсь?"}
  - {n: 48,  text: "Я не способен на измену даже в мыслях."}
  - {n: 49,  text: "Чаще всего я думаю о себе с дружеской иронией."}
  - {n: 50,  text: "Мне кажется, что мало кто может подумать обо мне плохо."}
  - {n: 51,  text: "Уверен, что на меня можно положиться в самых ответственных делах."}
  - {n: 52,  text: "Я могу сказать, что в целом я контролирую свою судьбу."}
  - {n: 53,  text: "Я никогда не выдаю понравившиеся мне чужие мысли за свои."}
  - {n: 54,  text: "Каким бы я ни казался окружающим, я-то знаю, что в глубине души я лучше, чем большинство других."}
  - {n: 55,  text: "Я хотел бы оставаться таким, какой я есть."}
  - {n: 56,  text: "Я всегда рад критике в свой адрес, если она обоснована и справедлива."}
  - {n: 57,  text: "Мне кажется, что если бы таких людей, как я, было больше, то жизнь изменилась бы в лучшую сторону."}
  - {n: 58,  text: "Мое мнение имеет достаточный вес в глазах окружающих."}
  - {n: 59,  text: "Что-то мешает мне понять себя по-настоящему."}
  - {n: 60,  text: "Во мне есть немало такого, что вряд ли вызывает симпатию."}
  - {n: 61,  text: "В сложных обстоятельствах я обычно не жду, пока проблемы разрешатся сами собой."}
  - {n: 62,  text: "Иногда я пытаюсь выдать себя не за того, кто я есть."}
  - {n: 63,  text: "Быть снисходительным к собственным слабостям — вполне естественно."}
  - {n: 64,  text: "Я убедился, что глубокое проникновение в себя — малоприятное и довольно рискованное занятие."}
  - {n: 65,  text: "Я никогда не раздражаюсь и не злюсь без особых на то причин."}
  - {n: 66,  text: "У меня бывают такие моменты, когда я понимал, что меня есть за что презирать."}
  - {n: 67,  text: "Я часто чувствую, что мало влияю на то, что со мной происходит."}
  - {n: 68,  text: "Именно богатство и глубина моего внутреннего мира и определяют мою ценность как личности."}
  - {n: 69,  text: "Долгие споры с собой чаще всего оставляют горький осадок в моей душе, чем приносят облегчение."}
  - {n: 70,  text: "Думаю, что общение со мной доставляет людям искреннее удовольствие."}
  - {n: 71,  text: "Если говорить откровенно, иногда я бываю очень неприятен."}
  - {n: 72,  text: "Можно сказать, что я себе нравлюсь."}
  - {n: 73,  text: "Я человек надежный."}
  - {n: 74,  text: "Осуществление моих желаний мало зависит от везения."}
  - {n: 75,  text: "Мое внутреннее «Я» всегда мне интересно."}
  - {n: 76,  text: "Мне очень просто убедить себя не расстраиваться по пустякам."}
  - {n: 77,  text: "Близким людям свойственно меня недооценивать."}
  - {n: 78,  text: "У меня в жизни нередко бывают минуты, когда я сам себе противен."}
  - {n: 79,  text: "Мне кажется, что я все-таки не умею злиться на себя по-настоящему."}
  - {n: 80,  text: "Я убедился, что в серьезных делах на меня лучше не рассчитывать."}
  - {n: 81,  text: "Порой мне кажется, что я какой-то странный."}
  - {n: 82,  text: "Я не склонен пасовать перед трудностями."}
  - {n: 83,  text: "Мое собственное «Я» не представляется мне чем-то достойным глубокого внимания."}
  - {n: 84,  text: "Мне кажется, что, глубоко обдумывая свои внутренние проблемы, я научился гораздо лучше себя понимать."}
  - {n: 85,  text: "Сомневаюсь, что вызываю симпатию у большинства окружающих."}
  - {n: 86,  text: "Мне случалось совершать такие поступки, которым вряд ли можно найти оправдание."}
  - {n: 87,  text: "Где-то в глубине души я считаю себя слабаком."}
  - {n: 88,  text: "Если я искренне и обвиняю себя в чем-то, то, как правило, обличительного запала хватает ненадолго."}
  - {n: 89,  text: "Мой характер, каким бы он ни был, вполне меня устраивает."}
  - {n: 90,  text: "Я вполне представляю себе, что меня ждет впереди."}
  - {n: 91,  text: "Иногда мне бывает трудно найти общий язык со своим внутренним «Я»."}
  - {n: 92,  text: "Мои мысли о себе по большей части сводятся к обвинениям в собственный адрес."}
  - {n: 93,  text: "Я не хотел бы сильно меняться даже в лучшую сторону, потому что каждое изменение — это потеря какой-то дорогой частицы самого себя."}
  - {n: 94,  text: "В результате моих действий слишком часто получается совсем не то, на что я рассчитывал."}
  - {n: 95,  text: "Вряд ли во мне есть что-то, чего бы я не знал."}
  - {n: 96,  text: "Мне еще многого не хватает, чтобы с уверенностью сказать себе: «Да, я вполне созрел как личность»."}
  - {n: 97,  text: "Во мне вполне мирно уживаются как мои достоинства, так и мои недостатки."}
  - {n: 98,  text: "Иногда я оказываю «бескорыстную» помощь людям только для того, чтобы лучше выглядеть в собственных глазах."}
  - {n: 99,  text: "Мне слишком часто и безуспешно приходится оправдываться перед самим собой."}
  - {n: 100, text: "Те, кто меня не любит, просто не знают, какой я человек."}
  - {n: 101, text: "Убедить себя в чем-то не составляет для меня большого труда."}
  - {n: 102, text: "Я не испытываю недостатка в близких и понимающих меня людях."}
  - {n: 103, text: "Мне кажется, что мало кто уважает меня по-настоящему."}
  - {n: 104, text: "Если не мелочиться, то в целом меня не в чем упрекнуть."}
  - {n: 105, text: "Я сам создал себя таким, каков я есть."}
  - {n: 106, text: "Мнение других обо мне вполне совпадает с моим собственным."}
  - {n: 107, text: "Мне бы очень хотелось во многом себя переделать."}
  - {n: 108, text: "Ко мне относятся так, как я того заслуживаю."}
  - {n: 109, text: "Думаю, что моя судьба сложится все равно не так, как бы мне хотелось теперь."}
  - {n: 110, text: "Уверен, что в жизни я на своем месте."}

scales:
  # "+" items = direct_items (Да=1 → 1 point)
  # "−" items = reverse_items (Нет=0 → max_score−0 = 1 point)
  - id: otkr
    name: "Открытость"
    direct_items: [1, 3, 9, 53, 56, 65]
    reverse_items: [21, 48, 62, 86, 98]
    is_total: false
  - id: suv
    name: "Самоуверенность"
    direct_items: [7, 24, 30, 35, 36, 51, 52, 58, 61, 73, 82]
    reverse_items: [20, 80, 103]
    is_total: false
  - id: sruk
    name: "Саморуководство"
    direct_items: [43, 44, 45, 74, 76, 84, 90, 105, 106, 108, 110]
    reverse_items: [109]
    is_total: false
  - id: zerk
    name: "Отраженное самоотношение"
    direct_items: [2, 5, 29, 41, 50, 102]
    reverse_items: [13, 18, 34, 85]
    is_total: false
  - id: scen
    name: "Самоценность"
    direct_items: [8, 16, 39, 54, 57, 68, 70, 75, 100]
    reverse_items: [15, 26, 31, 46, 83]
    is_total: false
  - id: spr
    name: "Самопринятие"
    direct_items: [10, 12, 17, 28, 40, 49, 63, 72, 77, 79, 88, 97]
    reverse_items: []
    is_total: false
  - id: spriv
    name: "Самопривязанность"
    direct_items: [6, 32, 33, 55, 89, 93, 95, 101, 104]
    reverse_items: [96, 107]
    is_total: false
  - id: konfl
    name: "Внутренняя конфликтность"
    direct_items: [4, 11, 22, 23, 27, 38, 47, 59, 64, 69, 81, 91, 94, 99]
    reverse_items: []
    is_total: false
  - id: sobv
    name: "Самообвинение"
    direct_items: [14, 19, 25, 37, 60, 66, 71, 78, 87, 92]
    reverse_items: []
    is_total: false

norms:
  # Открытость (max 11) — stens 1-3: 0-1, stens 4-7: 2-8, stens 8-10: 9-11
  - scale_id: otkr
    level: low
    label: Низкий
    min_val: 0
    max_val: 1
    interpretation: "Внутренняя честность, открытость отношений с самим собой, развитая рефлексия и глубокое понимание себя. Критичность по отношению к себе."
  - scale_id: otkr
    level: medium
    label: Средний
    min_val: 2
    max_val: 8
    interpretation: "Избирательное отношение к себе; преодоление некоторых психологических защит при актуализации других, особенно в критических ситуациях."
  - scale_id: otkr
    level: high
    label: Высокий
    min_val: 9
    max_val: 11
    interpretation: "Выраженное защитное поведение личности, желание соответствовать общепринятым нормам. Склонность избегать открытых отношений с самим собой."

  # Самоуверенность (max 14) — stens 1-3: 0-4, stens 4-7: 5-11, stens 8-10: 12-14
  - scale_id: suv
    level: low
    label: Низкий
    min_val: 0
    max_val: 4
    interpretation: "Неуважение к себе, неуверенность в своих возможностях, сомнения в способностях. Возможны избегание контактов, внутренняя напряженность."
  - scale_id: suv
    level: medium
    label: Средний
    min_val: 5
    max_val: 11
    interpretation: "В привычных ситуациях сохраняет уверенность в себе и ориентацию на успех. При неожиданных трудностях уверенность снижается, нарастают тревога и беспокойство."
  - scale_id: suv
    level: high
    label: Высокий
    min_val: 12
    max_val: 14
    interpretation: "Выраженная самоуверенность, ощущение силы собственного «Я», высокая смелость в общении. Доминирует мотив успеха. Уважает себя, доволен собой."

  # Саморуководство (max 12) — stens 1-3: 0-3, stens 4-7: 4-8, stens 8-10: 9-12
  - scale_id: sruk
    level: low
    label: Низкий
    min_val: 0
    max_val: 3
    interpretation: "Вера в подвластность своего «Я» внешним обстоятельствам. Ослабленные механизмы саморегуляции, недостаточный волевой контроль."
  - scale_id: sruk
    level: medium
    label: Средний
    min_val: 4
    max_val: 8
    interpretation: "В привычных условиях проявляет способность к личному контролю. В новых ситуациях регуляционные возможности ослабевают."
  - scale_id: sruk
    level: high
    label: Высокий
    min_val: 9
    max_val: 12
    interpretation: "Основным источником развития считает себя. Переживает собственное «Я» как внутренний стержень. Способен контролировать эмоциональные реакции."

  # Отраженное самоотношение (max 10) — stens 1-3: 0-2, stens 4-7: 3-8, stens 8-10: 9-10
  - scale_id: zerk
    level: low
    label: Низкий
    min_val: 0
    max_val: 2
    interpretation: "Относится к себе как к неспособному вызвать уважение у окружающих. Одобрение и поддержка от других не ожидаются."
  - scale_id: zerk
    level: medium
    label: Средний
    min_val: 3
    max_val: 8
    interpretation: "Избирательное восприятие отношения окружающих. Положительное отношение распространяется лишь на определенные качества."
  - scale_id: zerk
    level: high
    label: Высокий
    min_val: 9
    max_val: 10
    interpretation: "Воспринимает себя принятым окружающими. Чувствует, что его любят, ценят за личностные и духовные качества."

  # Самоценность (max 14) — stens 1-3: 0-3, stens 4-7: 4-10, stens 8-10: 11-14
  - scale_id: scen
    level: low
    label: Низкий
    min_val: 0
    max_val: 3
    interpretation: "Глубокие сомнения в уникальности своей личности. Неуверенность, повышенная чувствительность к критике, обидчивость."
  - scale_id: scen
    level: medium
    label: Средний
    min_val: 4
    max_val: 10
    interpretation: "Избирательное отношение к себе. Склонен высоко оценивать ряд качеств, другие недооцениваются."
  - scale_id: scen
    level: high
    label: Высокий
    min_val: 11
    max_val: 14
    interpretation: "Высоко оценивает свой духовный потенциал, богатство внутреннего мира. Склонен воспринимать себя как индивидуальность."

  # Самопринятие (max 12) — stens 1-3: 0-4, stens 4-7: 5-9, stens 8-10: 10-12
  - scale_id: spr
    level: low
    label: Низкий
    min_val: 0
    max_val: 4
    interpretation: "Общий негативный фон восприятия себя. Излишняя критичность к себе, симпатия к себе проявляется лишь эпизодически."
  - scale_id: spr
    level: medium
    label: Средний
    min_val: 5
    max_val: 9
    interpretation: "Избирательность отношения к себе. Принимает не все достоинства и критикует не все недостатки."
  - scale_id: spr
    level: high
    label: Высокий
    min_val: 10
    max_val: 12
    interpretation: "Склонность воспринимать все стороны своего «Я», принимать себя во всей полноте. Положительный фон восприятия. Симпатия к себе."

  # Самопривязанность (max 11) — stens 1-3: 0-2, stens 4-7: 3-8, stens 8-10: 9-11
  - scale_id: spriv
    level: low
    label: Низкий
    min_val: 0
    max_val: 2
    interpretation: "Высокая готовность к изменению «Я»-концепции, открытость новому опыту познания себя. Желание развивать и совершенствовать себя."
  - scale_id: spriv
    level: medium
    label: Средний
    min_val: 3
    max_val: 8
    interpretation: "Избирательность отношения к своим свойствам. Стремление к изменению лишь некоторых качеств при сохранении других."
  - scale_id: spriv
    level: high
    label: Высокий
    min_val: 9
    max_val: 11
    interpretation: "Высокая ригидность «Я»-концепции, стремление сохранить неизменными свои качества. Ощущение самодостаточности мешает саморазвитию."

  # Внутренняя конфликтность (max 14) — stens 1-3: 0-2, stens 4-7: 3-12, stens 8-10: 13-14
  - scale_id: konfl
    level: low
    label: Низкий
    min_val: 0
    max_val: 2
    interpretation: "В целом положительное отношение к себе. Баланс между возможностями и требованиями реальности. Возможны отрицание проблем и поверхностное восприятие себя."
  - scale_id: konfl
    level: medium
    label: Средний
    min_val: 3
    max_val: 12
    interpretation: "Отношение к себе зависит от степени адаптированности. В привычных условиях — положительный фон. Неожиданные трудности могут усилить недооценку собственных успехов."
  - scale_id: konfl
    level: high
    label: Высокий
    min_val: 13
    max_val: 14
    interpretation: "Преобладает негативный фон отношения к себе. Постоянный контроль над «Я», рефлексия переходит в самокопание. Конфликт между реальным и идеальным «Я»."

  # Самообвинение (max 10) — stens 1-3: 0-2, stens 4-7: 3-8, stens 8-10: 9-10
  - scale_id: sobv
    level: low
    label: Низкий
    min_val: 0
    max_val: 2
    interpretation: "Тенденция к отрицанию собственной вины. Защита «Я» путём обвинения других. Удовлетворенность собой сочетается с порицанием других."
  - scale_id: sobv
    level: medium
    label: Средний
    min_val: 3
    max_val: 8
    interpretation: "Избирательное отношение. Обвинение себя сочетается с выражением гнева, досады в адрес окружающих."
  - scale_id: sobv
    level: high
    label: Высокий
    min_val: 9
    max_val: 10
    interpretation: "Видит в себе прежде всего недостатки, готов поставить в вину все промахи и неудачи. Доминируют реакции самопорицания."
